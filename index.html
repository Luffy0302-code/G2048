<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G2048</title>
    <link rel="stylesheet" href="Text.css">
    <style>
        :root {
            --bg-color: #f9f6f0;       
            --text-color: #3d2314;     
            --navbar-bg: #3d2314;      
            --navbar-text: #f5ebe6;    
            --sidebar-bg: #ffffff;    
            --hover-color: #52301c;    
            --main-btn-bg: #3d2314;
            --main-btn-text: #ffffff;
        }

        body.dark-theme {
            --bg-color: #1a120b;       
            --text-color: #f5ebe6;     
            --navbar-bg: #110a05;      
            --navbar-text: #d5c3b7;    
            --sidebar-bg: #251a11;    
            --hover-color: #3d2314;    
            --main-btn-bg: #f5ebe6;
            --main-btn-text: #1a120b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s; 
        }

        body {
            background-color: var(--bg-color);
            overflow-x: hidden; 
            /* Prevents pull-to-refresh and accidental scrolling bounces on mobile browsers */
            touch-action: manipulation;
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: var(--navbar-bg); 
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            position: relative;
            z-index: 100; 
        }

        .logo {
            color: #ffffff; 
            font-size: 24px;
            font-weight: bold;
            margin-right: auto;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: var(--navbar-text);
            text-decoration: none;
            padding: 20px 15px;
            display: block;
            font-size: 16px;
        }

        .nav-links a:hover {
            background-color: var(--hover-color);
        }

        .theme-toggle-btn {
            background: none;
            border: 2px solid var(--navbar-text);
            color: var(--navbar-text);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 15px;
            font-weight: bold;
        }

        .theme-toggle-btn:hover {
            background-color: var(--navbar-text);
            color: var(--navbar-bg);
        }

        /* Nine-Dot Button */
        .nine-dot-button {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 3px;
            padding: 22px 15px; 
            margin-right: 15px; 
            cursor: pointer;
            position: relative;
            z-index: 140; 
        }

        .nine-dot-button span {
            width: 4px;
            height: 4px;
            background-color: var(--navbar-text);
            border-radius: 50%;
            display: inline-block;
        }

        /* Sidebar Menu */
        .dropdown-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh; 
            background-color: var(--sidebar-bg);
            box-shadow: 4px 0px 16px rgba(0,0,0,0.3);
            padding-top: 80px; 
            z-index: 130; 
            transform: translateX(-100%);
            transition: transform 0.4s ease; 
        }

        .dropdown-content.open {
            transform: translateX(0);
        }

        .dropdown-content a {
            color: var(--text-color);
            padding: 15px 25px;
            display: block;
            text-decoration: none;
            font-size: 18px;
        }

        .dropdown-content a:hover {
            background-color: var(--hover-color);
            color: #ffffff;
        }

        .dropdown-content a.download-btn {
            background-color: #52301c;
            color: #ffffff;
            text-align: center;
            font-weight: bold;
            margin: 15px 25px;
            padding: 12px;
            border-radius: 4px;
        }

        /* Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(8px); 
            z-index: 120; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.4s ease;
        }

        .menu-overlay.show {
            opacity: 1;
            pointer-events: auto; 
        }

        /* Content Container */
        .content {
            padding: 20px 10px;
            text-align: center;
            color: var(--text-color);
        }

        .content h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .content p {
            font-size: 16px;
            margin-bottom: 15px;
        }

        .main-download-btn {
            display: inline-block;
            background-color: var(--main-btn-bg);
            color: var(--main-btn-text);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.3s;
            margin: 0 5px 20px 5px;
        }

        .main-download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        /* --- 2048 Game Styling Area --- */
       /* --- Keep your root variables, navbar, and sidebar exactly the same --- */

.game-container {
    width: 100%;
    max-width: 360px;
    margin: 10px auto;
    position: relative;
    text-align: left;
    padding: 0 10px;
}

.game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.title {
    font-size: 36px;
    font-weight: bold;
    color: #776e65;
}

.score-container {
    background: #bbada0;
    padding: 5px 15px;
    border-radius: 3px;
    text-align: center;
    color: white;
    min-width: 80px;
}

.score-label {
    font-size: 10px;
    font-weight: bold;
}

#score {
    font-size: 18px;
    font-weight: bold;
}

#restart-btn, #retry-btn {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    border-radius: 3px;
    padding: 10px 20px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 15px;
    font-size: 14px;
}

/* --- Fixed Aspect Ratio Grid Setup --- */
.grid-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 100%; 
}

.grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #bbada0;
    border-radius: 6px;
    padding: 12px; /* Fixed padding for consistent math */
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 12px; /* Fixed gaps prevent float calculation errors */
}

.grid-cell {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 4px;
    width: 100%;
    height: 100%;
}

/* The container must overlay perfectly on top of the grid spacing layout */
.tile-container {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 5;
    pointer-events: none;
}

.tile {
    position: absolute;
    /* Percentages here are calculated relative to the .tile-container box, NOT the tile itself! */
    width: 22.75%; 
    height: 22.75%;
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    
    /* Using top/left percentages paired with normal transforms keeps tracking bulletproof */
    transition: top 180ms ease-in-out, left 180ms ease-in-out;
    animation: appear 160ms ease-in-out;
    will-change: top, left;
}

.tile-pop {
    animation: pop 140ms ease-in-out;
}

/* Colors styling */
.tile-2 { background: #eee4da; color: #776e65; }
.tile-4 { background: #ede0c8; color: #776e65; }
.tile-8 { background: #f2b179; color: #f9f6f2; }
.tile-16 { background: #f59563; color: #f9f6f2; }
.tile-32 { background: #f67c5f; color: #f9f6f2; }
.tile-64 { background: #f65e3b; color: #f9f6f2; }
.tile-128 { background: #edcf72; color: #f9f6f2; }
.tile-256 { background: #edcc61; color: #f9f6f2; }
.tile-512 { background: #edc850; color: #f9f6f2; }
.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 22px; }
.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 22px; }

#game-over {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(238, 228, 218, 0.85);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 6px;
}

#game-over.hidden {
    display: none;
}

#game-over p {
    font-size: 32px;
    font-weight: bold;
    color: #776e65;
    margin-bottom: 20px;
}

@keyframes appear {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
}

@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="dropdown-content" id="sideMenu">
        
        <a href="DownloadPC.html" class="download-btn">Download for PC</a>
        <a href="#">Dark Chocolate</a>
        <a href="#">Milk Chocolate</a>
        <a href="#">White Chocolate</a>
        <a href="G2048.Folder.zip" download="G2048.Folder.zip">Source code</a>
    </div>

    <nav class="navbar">
        <div class="nine-dot-button" id="menuBtn">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <a href="index.html" class="logo">G2048</a>
        
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="theme-toggle-btn" id="themeToggle">🌙 Dark</button>
    </nav>

    <main class="content">
        <h1>G2048</h1>
        <p>Satisfying game with numbers.</p>
        
        <a href="DownloadPC.html" class="main-download-btn">Download for PC</a>
        <a href="G2028 instruction Manual.docx" class="main-download-btn">Manual</a>

        <div class="game-container">
            <div class="game-header">
                <div class="title">2048</div>
                <div class="score-container">
                    <div class="score-label">SCORE</div>
                    <div id="score">0</div>
                </div>
            </div>
            
            <button id="restart-btn">New Game</button>

            <div class="grid-wrapper">
                <div id="game-over" class="hidden">
                    <p>Game Over!</p>
                    <button id="retry-btn">Try Again</button>
                </div>

                <div class="grid-container">
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    
                    <div class="tile-container" id="tile-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- UI Elements ---
            const menuBtn = document.getElementById('menuBtn');
            const sideMenu = document.getElementById('sideMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            const themeToggle = document.getElementById('themeToggle');

            menuBtn.addEventListener('click', (e) => {
                sideMenu.classList.toggle('open');
                menuOverlay.classList.toggle('show');
                e.stopPropagation();
            });

            menuOverlay.addEventListener('click', () => {
                sideMenu.classList.remove('open');
                menuOverlay.classList.remove('show');
            });

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                themeToggle.textContent = document.body.classList.contains('dark-theme') ? '☀️ Light' : '🌙 Dark';
            });

            // --- Game Configuration Engine ---
            const scoreDisplay = document.getElementById('score');
    const restartBtn = document.getElementById('restart-btn');
    const retryBtn = document.getElementById('retry-btn');
    const gameOverScreen = document.getElementById('game-over');
    const tileContainer = document.getElementById('tile-container');

    let board = Array(16).fill(0);
    let score = 0;
    let tileIdCounter = 0;
    let currentTilesMap = {}; 
    let isMoving = false;

    // Fixed positional grid stepping logic 
    function getTilePositionPercent(index) {
        const row = Math.floor(index / 4);
        const col = index % 4;
        return {
            left: col * 25.75,
            top: row * 25.75
        };
    }

    function startGame() {
        gameOverScreen.classList.add('hidden');
        board = Array(16).fill(0);
        score = 0;
        scoreDisplay.innerText = 0;
        tileContainer.innerHTML = '';
        currentTilesMap = {};
        isMoving = false;
        generateTile();
        generateTile();
        renderBoard();
    }

    function generateTile() {
        const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
        if (emptyCells.length === 0) return;
        const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        const val = Math.random() < 0.9 ? 2 : 4;
        
        board[randomCell] = {
            id: tileIdCounter++,
            value: val,
            merged: false
        };
    }

    function renderBoard() {
        const updatedTilesMap = {};

        board.forEach((tileData, index) => {
            if (!tileData) return;

            const pos = getTilePositionPercent(index);
            let tileEl = currentTilesMap[tileData.id];

            if (!tileEl) {
                tileEl = document.createElement('div');
                tileEl.innerText = tileData.value;
                tileEl.className = `tile tile-${tileData.value}`;
                // Set layout via strict positioning rules 
                tileEl.style.left = `${pos.left}%`;
                tileEl.style.top = `${pos.top}%`;
                tileContainer.appendChild(tileEl);
            } else {
                tileEl.className = `tile tile-${tileData.value}`;
                tileEl.style.left = `${pos.left}%`;
                tileEl.style.top = `${pos.top}%`;
            }
            
            if (tileData.merged) {
                tileEl.classList.add('tile-pop');
                tileEl.innerText = tileData.value;
            }

            updatedTilesMap[tileData.id] = tileEl;
        });

        for (const id in currentTilesMap) {
            if (!updatedTilesMap[id]) {
                const orphanedTile = currentTilesMap[id];
                setTimeout(() => {
                    orphanedTile.remove();
                }, 200);
            }
        }

        currentTilesMap = updatedTilesMap;
    }

    function slideLine(line, getBoardIndexFunc) {
        let moved = false;
        let filtered = line.filter(val => val);

        for (let i = 0; i < filtered.length - 1; i++) {
            if (filtered[i] && filtered[i+1] && filtered[i].value === filtered[i+1].value) {
                filtered[i].value *= 2;
                score += filtered[i].value;
                filtered[i].merged = true;

                const disappearingTileId = filtered[i+1].id;
                if (currentTilesMap[disappearingTileId]) {
                    const targetIdx = getBoardIndexFunc(i);
                    const targetPos = getTilePositionPercent(targetIdx);
                    currentTilesMap[disappearingTileId].style.left = `${targetPos.left}%`;
                    currentTilesMap[disappearingTileId].style.top = `${targetPos.top}%`;
                }

                filtered.splice(i + 1, 1);
                moved = true;
            }
        }

        while (filtered.length < 4) {
            filtered.push(0);
        }

        return { filtered, moved };
    }

    function handleMove(direction) {
        if (isMoving) return;
        isMoving = true;

        board.forEach(tile => { if (tile) tile.merged = false; });
        let totalMoved = false;

        for (let i = 0; i < 4; i++) {
            let line = [];
            let getBoardIndex = (j) => 0;

            if (direction === 0) { // LEFT
                line = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                getBoardIndex = (j) => i * 4 + j;
            } else if (direction === 2) { // RIGHT
                line = [board[i*4+3], board[i*4+2], board[i*4+1], board[i*4+0]];
                getBoardIndex = (j) => i * 4 + (3 - j);
            } else if (direction === 1) { // UP
                line = [board[i], board[i+4], board[i+8], board[i+12]];
                getBoardIndex = (j) => j * 4 + i;
            } else if (direction === 3) { // DOWN
                line = [board[i+12], board[i+8], board[i+4], board[i]];
                getBoardIndex = (j) => (3 - j) * 4 + i;
            }

            const result = slideLine(line, getBoardIndex);
            
            for (let j = 0; j < 4; j++) {
                const targetIdx = getBoardIndex(j);
                if (JSON.stringify(board[targetIdx]) !== JSON.stringify(result.filtered[j])) {
                    totalMoved = true;
                }
                board[targetIdx] = result.filtered[j];
            }
        }

        if (totalMoved) {
            scoreDisplay.innerText = score;
            renderBoard();
            
            setTimeout(() => {
                generateTile();
                renderBoard();
                checkGameOver();
                isMoving = false;
            }, 180); 
        } else {
            isMoving = false;
        }
    }

    // --- Keypress and Swipe Gestures ---
    window.addEventListener('keydown', (e) => {
        if (['ArrowLeft', 'ArrowUp', 'ArrowRight', 'ArrowDown', 'w', 'a', 's', 'd'].includes(e.key)) {
            e.preventDefault();
        }
        if (e.key === 'ArrowLeft' || e.key === 'a') handleMove(0);
        else if (e.key === 'ArrowUp' || e.key === 'w') handleMove(1);
        else if (e.key === 'ArrowRight' || e.key === 'd') handleMove(2);
        else if (e.key === 'ArrowDown' || e.key === 's') handleMove(3);
    });

    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
        if (!touchStartX || !touchStartY) return;
        let dx = e.changedTouches[0].clientX - touchStartX;
        let dy = e.changedTouches[0].clientY - touchStartY;

        if (Math.abs(dx) > 40 || Math.abs(dy) > 40) {
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0) handleMove(2);
                else handleMove(0);
            } else {
                if (dy > 0) handleMove(3);
                else handleMove(1);
            }
        }
        touchStartX = 0; touchStartY = 0;
    }, { passive: true });

    function checkGameOver() {
        const hasEmptyCells = board.some(cell => cell === 0);
        if (hasEmptyCells) return;
        for (let i = 0; i < 16; i++) {
            if (i % 4 < 3 && board[i].value === board[i + 1].value) return;
            if (i < 12 && board[i].value === board[i + 4].value) return;
        }
        gameOverScreen.classList.remove('hidden');
    }

    restartBtn.addEventListener('click', startGame);
    retryBtn.addEventListener('click', startGame);
    startGame();
});
    </script>
</body>
