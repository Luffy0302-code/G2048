<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G2048</title>
    <style>
        :root {
            --bg-color: #f9f6f0;       
            --text-color: #3d2314;     
            --navbar-bg: #3d2314;      
            --navbar-text: #f5ebe6;    
            --sidebar-bg: #ffffff;    
            --hover-color: #52301c;    
            --main-btn-bg: #3d2314;
            --main-btn-text: #ffffff;
        }

        body.dark-theme {
            --bg-color: #1a120b;       
            --text-color: #f5ebe6;     
            --navbar-bg: #110a05;      
            --navbar-text: #d5c3b7;    
            --sidebar-bg: #251a11;    
            --hover-color: #3d2314;    
            --main-btn-bg: #f5ebe6;
            --main-btn-text: #1a120b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s; 
        }

        body {
            background-color: var(--bg-color);
            overflow-x: hidden; 
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: var(--navbar-bg); 
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            position: relative;
            z-index: 100; 
        }

        .logo {
            color: #ffffff; 
            font-size: 24px;
            font-weight: bold;
            margin-right: auto;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: var(--navbar-text);
            text-decoration: none;
            padding: 20px 15px;
            display: block;
            font-size: 16px;
        }

        .nav-links a:hover {
            background-color: var(--hover-color);
        }

        .theme-toggle-btn {
            background: none;
            border: 2px solid var(--navbar-text);
            color: var(--navbar-text);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 15px;
            font-weight: bold;
        }

        .theme-toggle-btn:hover {
            background-color: var(--navbar-text);
            color: var(--navbar-bg);
        }

        /* Nine-Dot Button */
        .nine-dot-button {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 3px;
            padding: 22px 15px; 
            margin-right: 15px; 
            cursor: pointer;
            position: relative;
            z-index: 140; 
        }

        .nine-dot-button span {
            width: 4px;
            height: 4px;
            background-color: var(--navbar-text);
            border-radius: 50%;
            display: inline-block;
        }

        /* Sidebar Menu */
        .dropdown-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh; 
            background-color: var(--sidebar-bg);
            box-shadow: 4px 0px 16px rgba(0,0,0,0.3);
            padding-top: 80px; 
            z-index: 130; 
            transform: translateX(-100%);
            transition: transform 0.4s ease; 
        }

        .dropdown-content.open {
            transform: translateX(0);
        }

        .dropdown-content a {
            color: var(--text-color);
            padding: 15px 25px;
            display: block;
            text-decoration: none;
            font-size: 18px;
        }

        .dropdown-content a:hover {
            background-color: var(--hover-color);
            color: #ffffff;
        }

        .dropdown-content a.download-btn {
            background-color: #52301c;
            color: #ffffff;
            text-align: center;
            font-weight: bold;
            margin: 15px 25px;
            padding: 12px;
            border-radius: 4px;
        }

        /* Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(8px); 
            z-index: 120; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.4s ease;
        }

        .menu-overlay.show {
            opacity: 1;
            pointer-events: auto; 
        }

        /* Content Container */
        .content {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-color);
        }

        .content h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .content p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .main-download-btn {
            display: inline-block;
            background-color: var(--main-btn-bg);
            color: var(--main-btn-text);
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.3s;
            margin: 0 10px 30px 10px;
        }

        .main-download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        /* --- 2048 Game Styling Area --- */
        .game-container {
            width: 340px;
            margin: 20px auto;
            position: relative;
            text-align: left;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
        }

        .score-container {
            background: #bbada0;
            padding: 5px 15px;
            border-radius: 3px;
            text-align: center;
            color: white;
        }

        .score-label {
            font-size: 10px;
            font-weight: bold;
        }

        #score {
            font-size: 20px;
            font-weight: bold;
        }

        #restart-btn, #retry-btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            border-radius: 3px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        #restart-btn:hover, #retry-btn:hover {
            background: #7f6a56;
        }

        .grid-container {
            width: 340px;
            height: 340px;
            background: #bbada0;
            border-radius: 6px;
            position: relative;
            padding: 12px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-template-rows: repeat(4, 70px);
            gap: 12px;
        }

        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 4px;
            width: 70px;
            height: 70px;
        }

        .tile-container {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 316px;
            height: 316px;
            z-index: 5;
            pointer-events: none;
        }

        .tile {
            width: 70px;
            height: 70px;
            border-radius: 4px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            
            /* Slower smooth glide configuration */
            transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
            animation: appear 160ms ease-in-out;
            will-change: transform;
        }

        .tile-pop {
            animation: pop 140ms ease-in-out;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.85);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
        }

        #game-over.hidden {
            display: none;
        }

        #game-over p {
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="dropdown-content" id="sideMenu">
        <a href="DownloadPC.html" class="download-btn">Download for PC</a>
        <a href="#">Dark Chocolate</a>
        <a href="#">Milk Chocolate</a>
        <a href="#">White Chocolate</a>
        <a href="#">Truffles & Bonbons</a>
    </div>

    <nav class="navbar">
        <div class="nine-dot-button" id="menuBtn">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <a href="index.html" class="logo">G2048</a>
        
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="theme-toggle-btn" id="themeToggle">🌙 Dark</button>
    </nav>

    <main class="content">
        <h1>G2048</h1>
        <p>Satisfying game with numbers.</p>
        
        <a href="DownloadPC.html" class="main-download-btn">Download for PC</a>
        <a href="G2028 instruction Manual.docx" class="main-download-btn">Manual</a>

        <div class="game-container">
            <div class="game-header">
                <div class="title">2048</div>
                <div class="score-container">
                    <div class="score-label">SCORE</div>
                    <div id="score">0</div>
                </div>
            </div>
            
            <button id="restart-btn">New Game</button>

            <div id="game-over" class="hidden">
                <p>Game Over!</p>
                <button id="retry-btn">Try Again</button>
            </div>

            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                
                <div class="tile-container" id="tile-container"></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- UI Elements ---
            const menuBtn = document.getElementById('menuBtn');
            const sideMenu = document.getElementById('sideMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            const themeToggle = document.getElementById('themeToggle');

            menuBtn.addEventListener('click', (e) => {
                sideMenu.classList.toggle('open');
                menuOverlay.classList.toggle('show');
                e.stopPropagation();
            });

            menuOverlay.addEventListener('click', () => {
                sideMenu.classList.remove('open');
                menuOverlay.classList.remove('show');
            });

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                themeToggle.textContent = document.body.classList.contains('dark-theme') ? '☀️ Light' : '🌙 Dark';
            });

            // --- Game Configuration Engine ---
            const scoreDisplay = document.getElementById('score');
            const restartBtn = document.getElementById('restart-btn');
            const retryBtn = document.getElementById('retry-btn');
            const gameOverScreen = document.getElementById('game-over');
            const tileContainer = document.getElementById('tile-container');
            
            const CELL_SIZE = 70;
            const GAP = 12;

            let board = Array(16).fill(0);
            let score = 0;
            let tileIdCounter = 0;
            let currentTilesMap = {}; 
            let isMoving = false;

            function getTilePosition(index) {
                const row = Math.floor(index / 4);
                const col = index % 4;
                return {
                    x: col * (CELL_SIZE + GAP),
                    y: row * (CELL_SIZE + GAP)
                };
            }

            function startGame() {
                gameOverScreen.classList.add('hidden');
                board = Array(16).fill(0);
                score = 0;
                scoreDisplay.innerText = 0;
                tileContainer.innerHTML = '';
                currentTilesMap = {};
                isMoving = false;
                generateTile();
                generateTile();
                renderBoard();
            }

            function generateTile() {
                const emptyCells = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
                if (emptyCells.length === 0) return;
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const val = Math.random() < 0.9 ? 2 : 4;
                
                board[randomCell] = {
                    id: tileIdCounter++,
                    value: val,
                    merged: false
                };
            }

            function renderBoard() {
                const updatedTilesMap = {};

                board.forEach((tileData, index) => {
                    if (!tileData) return;

                    const pos = getTilePosition(index);
                    let tileEl = currentTilesMap[tileData.id];

                    if (!tileEl) {
                        tileEl = document.createElement('div');
                        tileEl.innerText = tileData.value;
                        tileEl.className = `tile tile-${tileData.value}`;
                        
                        // Anti-Ghosting Core Fix: Enforce true position immediately on creation to prevent (0,0) corner renders
                        tileEl.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
                        tileContainer.appendChild(tileEl);
                    } else {
                        // Smoothly transition positions for existing tiles
                        tileEl.className = `tile tile-${tileData.value}`;
                        tileEl.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
                    }
                    
                    if (tileData.merged) {
                        tileEl.classList.add('tile-pop');
                        tileEl.innerText = tileData.value;
                    }

                    updatedTilesMap[tileData.id] = tileEl;
                });

                // Clear missing elements cleanly after animation cycle wraps up
                for (const id in currentTilesMap) {
                    if (!updatedTilesMap[id]) {
                        const orphanedTile = currentTilesMap[id];
                        setTimeout(() => {
                            orphanedTile.remove();
                        }, 220);
                    }
                }

                currentTilesMap = updatedTilesMap;
            }

            function moveLeft() {
                let moved = false;
                for (let i = 0; i < 16; i += 4) {
                    let row = [board[i], board[i+1], board[i+2], board[i+3]];
                    let filteredRow = row.filter(val => val);
                    
                    for (let j = 0; j < filteredRow.length - 1; j++) {
                        if (filteredRow[j].value === filteredRow[j+1].value) {
                            filteredRow[j].value *= 2;
                            score += filteredRow[j].value;
                            filteredRow[j].merged = true;
                            
                            // Fixed calculation to map the correct array-index target element position
                            const disappearingTileId = filteredRow[j+1].id;
                            if (currentTilesMap[disappearingTileId]) {
                                const targetPos = getTilePosition(i + j);
                                currentTilesMap[disappearingTileId].style.transform = `translate(${targetPos.x}px, ${targetPos.y}px)`;
                            }

                            filteredRow.splice(j + 1, 1); 
                            moved = true;
                        }
                    }

                    while (filteredRow.length < 4) {
                        filteredRow.push(0);
                    }

                    for (let j = 0; j < 4; j++) {
                        if (JSON.stringify(board[i + j]) !== JSON.stringify(filteredRow[j])) {
                            moved = true;
                        }
                        board[i + j] = filteredRow[j];
                    }
                }
                return moved;
            }

            function rotateBoard() {
                let rotated = Array(16).fill(0);
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        rotated[c * 4 + (3 - r)] = board[r * 4 + c];
                    }
                }
                board = rotated;
            }

            function handleMove(direction) {
                if (isMoving) return; 
                isMoving = true;
                
                board.forEach(tile => { if(tile) tile.merged = false; });

                for (let i = 0; i < direction; i++) rotateBoard();
                let moved = moveLeft();
                const rem = direction === 0 ? 0 : 4 - direction;
                for (let i = 0; i < rem; i++) rotateBoard();

                if (moved) {
                    scoreDisplay.innerText = score;
                    renderBoard();
                    
                    setTimeout(() => {
                        generateTile();
                        renderBoard();
                        checkGameOver();
                        isMoving = false;
                    }, 180); 
                } else {
                    isMoving = false;
                }
            }

            window.addEventListener('keydown', (e) => {
                if (['ArrowLeft', 'ArrowUp', 'ArrowRight', 'ArrowDown', 'w', 'a', 's', 'd'].includes(e.key)) {
                    e.preventDefault();
                }
                if (e.key === 'ArrowLeft' || e.key === 'a') handleMove(0);
                else if (e.key === 'ArrowUp' || e.key === 'w') handleMove(3); // Swapped 1 -> 3
                else if (e.key === 'ArrowRight' || e.key === 'd') handleMove(2);
                else if (e.key === 'ArrowDown' || e.key === 's') handleMove(1); // Swapped 3 -> 1
            });

            function checkGameOver() {
                const hasEmptyCells = board.some(cell => cell === 0);
                if (hasEmptyCells) return;

                for (let i = 0; i < 16; i++) {
                    if (i % 4 < 3 && board[i].value === board[i + 1].value) return;
                    if (i < 12 && board[i].value === board[i + 4].value) return;
                }
                gameOverScreen.classList.remove('hidden');
            }

            restartBtn.addEventListener('click', startGame);
            retryBtn.addEventListener('click', startGame);

            startGame();
        });
    </script>
</body>
</html>
